{% extends 'base.html' %}

{% block title %}Select Movie{% endblock %}

{% block content %}
<div class="container">
    <h1 class="heading">Select Movie</h1>
    {% for movie in options: %}
  <p>
    <!--the links are created here, by pulling 
    attributes of each "movie" dictionary item in the "options" dictionary
    the "objects" is generated by the "data = response.json()["results"]" 
    object of the add_movie() function.
    this object stores the dictionary of movies generated  by the user's
    query
    *the href then directs us to the /find route specific to the
    API's id for that movie-->
    <a href="{{ url_for('find_movie', id=movie.id) }}">{{ movie.title }} - {{movie.release_date}}</a>
  </p>
  {% endfor %}

</div>
{% endblock %}
