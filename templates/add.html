{% extends 'base.html' %}
{% from 'bootstrap5/form.html' import render_form %}

{% block title %}Add Movie{% endblock %}

{% block content %}
<div class="content">
    <h1 class="heading">Add a Movie</h1>
    <!--form pulls from the py form variable from main.py
    passed by form=form from main
    novalidate because main.py already has
     validators=[DataRequired()]; server side validation
     novalidate to avoid redundancy
     no need for HTML5 validation-->
    {{ render_form(form, novalidate=True) }}
</div>
{% endblock %}
